name: Deploy Backend to Fly.io

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "HOME is $HOME"
          echo "Looking for fly binary:"
          find / -name "fly" -type f 2>/dev/null || echo "fly not found anywhere"
          find / -name "flyctl" -type f 2>/dev/null || echo "flyctl not found anywhere"

      - name: Deploy to Fly.io
        run: $HOME/.fly/bin/fly deploy --remote-only
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
